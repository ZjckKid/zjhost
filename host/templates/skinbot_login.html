<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="ZJH SkinBot - Login" />
    <meta property="og:description" content="Вхід в панель скінів" />
    <meta property="og:type" content="website" />
    <title>ZJH SkinBot - Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .floating-shapes::before,
        .floating-shapes::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        .floating-shapes::before {
            width: 200px;
            height: 200px;
            top: 20%;
            right: 10%;
            animation-delay: -2s;
        }
        .floating-shapes::after {
            width: 150px;
            height: 150px;
            bottom: 30%;
            left: 15%;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="gradient-bg">
    <div class="floating-shapes"></div>
    
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="glass-effect rounded-2xl p-8 w-full max-w-md shadow-2xl relative z-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg">
                    <i class="fab fa-telegram text-white text-4xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">SkinBot</h1>
                <p class="text-white/70">Вхід через Telegram</p>
            </div>

            <!-- Flash messages -->
            <div id="flashMessages" class="mb-6 space-y-2 hidden"></div>

            <!-- Instructions -->
            <div class="glass-effect rounded-xl p-4 mb-6">
                <h3 class="text-white font-semibold mb-3 flex items-center">
                    <i class="fas fa-info-circle mr-2"></i>Як увійти:
                </h3>
                <ol class="text-white/80 text-sm space-y-2 list-decimal list-inside">
                    <li>Відкрийте бота в Telegram: <a href="https://t.me/skinshorizonsbot" target="_blank" class="text-blue-300 hover:text-blue-200 underline">@skinshorizonsbot</a></li>
                    <li>Надішліть команду <code class="bg-white/20 px-2 py-1 rounded">/connect</code></li>
                    <li>Скопіюйте отриманий код</li>
                    <li>Вставте код нижче</li>
                </ol>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="code" class="block text-sm font-medium text-white/90 mb-2">
                        <i class="fas fa-key mr-2"></i>Код з Telegram
                    </label>
                    <input type="text" 
                           id="code" 
                           name="code" 
                           required
                           maxlength="6"
                           placeholder="Введіть 6-значний код"
                           class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-black text-center text-2xl font-mono placeholder-white/50 focus:outline-none input-glow focus:border-white/40 transition-all duration-300 uppercase"
                           style="letter-spacing: 0.5em;">
                    <p class="text-white/60 text-xs mt-2">
                        <i class="fas fa-clock mr-1"></i>Код дійсний 10 хвилин
                    </p>
                </div>

                <button type="submit" 
                        id="submitBtn"
                        class="w-full py-3 px-4 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-semibold rounded-lg shadow-lg hover:from-blue-600 hover:to-purple-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transform hover:scale-105 transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i>Увійти
                </button>
            </form>

            <!-- Back to Main -->
            <div class="mt-6 text-center space-y-3">
                <a href="{{ url_for('index') }}" 
                   class="inline-flex items-center text-white/70 hover:text-white transition-colors duration-300">
                    <i class="fas fa-arrow-left mr-2"></i>Повернутися на головну
                </a>
                
                <div class="pt-4 border-t border-white/20">
                    <p class="text-white/60 text-sm mb-2">
                        <i class="fas fa-robot mr-1"></i>Ще не маєте акаунту?
                    </p>
                    <a href="https://t.me/skinshorizonsbot" 
                       target="_blank"
                       class="inline-flex items-center px-4 py-2 bg-blue-500/20 text-blue-200 rounded-lg hover:bg-blue-500/40 transition-all duration-300">
                        <i class="fab fa-telegram mr-2"></i>Відкрити бота
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const codeInput = document.getElementById('code');
        const submitBtn = document.getElementById('submitBtn');
        const flashMessages = document.getElementById('flashMessages');

        // Автоматично перетворюємо на великі літери
        codeInput.addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
        });

        // Показати повідомлення
        function showMessage(message, type) {
            const alertClass = type === 'error' ? 'bg-red-500/20 text-red-100 border-red-400/30' : 
                              type === 'success' ? 'bg-green-500/20 text-green-100 border-green-400/30' : 
                              'bg-blue-500/20 text-blue-100 border-blue-400/30';
            
            flashMessages.innerHTML = `
                <div class="p-3 rounded-lg text-sm font-medium border ${alertClass}">
                    <i class="fas fa-${type === 'error' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'info-circle'} mr-2"></i>
                    ${message}
                </div>
            `;
            flashMessages.classList.remove('hidden');
            
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = '/skinbot';
                }, 1500);
            }
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const code = codeInput.value.trim();
            
            if (code.length !== 6) {
                showMessage('Код повинен містити 6 символів', 'error');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Перевірка...';
            
            try {
                const response = await fetch('/skinbot/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code: code })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Успішний вхід! Перенаправлення...', 'success');
                } else {
                    showMessage(data.message || 'Невірний або прострочений код', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Увійти';
                }
            } catch (error) {
                showMessage('Помилка з\'єднання. Спробуйте ще раз.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Увійти';
            }
        });

        // Додаткові плаваючі елементи
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.floating-shapes');
            for (let i = 0; i < 3; i++) {
                const circle = document.createElement('div');
                circle.className = 'absolute rounded-full bg-white/5';
                circle.style.width = Math.random() * 100 + 50 + 'px';
                circle.style.height = circle.style.width;
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 6 + 's';
                circle.style.animation = 'float 8s ease-in-out infinite';
                container.appendChild(circle);
            }
        });
    </script>
</body>
</html>

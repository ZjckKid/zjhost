<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZJH Вхід в систему - Файлове сховище</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .floating-shapes::before,
        .floating-shapes::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        .floating-shapes::before {
            width: 200px;
            height: 200px;
            top: 20%;
            right: 10%;
            animation-delay: -2s;
        }
        .floating-shapes::after {
            width: 150px;
            height: 150px;
            bottom: 30%;
            left: 15%;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body class="gradient-bg">
    <div class="floating-shapes"></div>
    
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="glass-effect rounded-2xl p-8 w-full max-w-md shadow-2xl relative z-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg">
                    <i class="fas fa-shield-alt text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white mb-2">Вхід в систему</h1>
                <p class="text-white/70">Введіть пароль для доступу до адміністрування</p>
            </div>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-6 space-y-2">
                        {% for category, message in messages %}
                            <div class="p-3 rounded-lg text-sm font-medium
                                {% if category == 'success' %}bg-green-500/20 text-green-100 border border-green-400/30{% endif %}
                                {% if category == 'error' %}bg-red-500/20 text-red-100 border border-red-400/30{% endif %}
                                {% if category == 'info' %}bg-blue-500/20 text-blue-100 border border-blue-400/30{% endif %}">
                                <i class="fas fa-info-circle mr-2"></i>{{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form method="POST" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium text-white/90 mb-2">
                        <i class="fas fa-key mr-2"></i>Пароль адміністратора
                    </label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           required
                           class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none input-glow focus:border-white/40 transition-all duration-300"
                           placeholder="Введіть пароль...">
                </div>

                <button type="submit" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-semibold rounded-lg shadow-lg hover:from-blue-600 hover:to-purple-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transform hover:scale-105 transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i>Увійти
                </button>
            </form>

            <!-- Back to Main -->
            <div class="mt-6 text-center">
                <a href="{{ url_for('index') }}" 
                   class="inline-flex items-center text-white/70 hover:text-white transition-colors duration-300">
                    <i class="fas fa-arrow-left mr-2"></i>Повернутися на головну
                </a>
            </div>
        </div>
    </div>

    <!-- Background Animation -->
    <script>
        // Добавляем дополнительные плавающие элементы
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.floating-shapes');
            for (let i = 0; i < 3; i++) {
                const circle = document.createElement('div');
                circle.className = 'absolute rounded-full bg-white/5';
                circle.style.width = Math.random() * 100 + 50 + 'px';
                circle.style.height = circle.style.width;
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 6 + 's';
                circle.style.animation = 'float 8s ease-in-out infinite';
                container.appendChild(circle);
            }
        });
    </script>
</body>
</html>

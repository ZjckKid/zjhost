<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2196F3;
            --background: #f5f5f5;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--background);
            line-height: 1.6;
        }
        .text-preview {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 2rem;
        }
        .pagination {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        .download-section {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 1rem 0;
            border-top: 1px solid #eee;
        }
        .preview-content img {
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .preview-content video {
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
            background: #000;
            border-radius: 8px;
        }
        .preview-content {
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            position: relative;
        }
        .preview-content {
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            position: relative;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .button-group {
            margin-top: auto;
            padding-top: 1rem;
        }

        .file-card h3 {
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            max-height: 3em;
        }
        .file-card a {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            background: #2196F3;
            color: white;
            transition: background 0.3s;
        }

        .file-card a:hover {
            background: #1976D2;
        }
        .file-card p {
            color: #666;
            font-size: 0.9rem;
        }
        .search-box {
            margin: 2rem 0;
            display: flex;
            gap: 1rem;
        }

        .search-input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            grid-auto-rows: minmax(150px, auto);
        }

        .file-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            max-width: 100%;
            overflow: hidden;
        }

        .file-card:hover {
            transform: translateY(-2px);
        }

        .preview-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 2rem;
            color: #666;
        }

        .error-container {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error-code {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>

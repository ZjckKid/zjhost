<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZJH - Приватний файл</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .password-field {
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .floating-shapes::before,
        .floating-shapes::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        .floating-shapes::before {
            width: 200px;
            height: 200px;
            top: 20%;
            right: 10%;
            animation-delay: -2s;
        }
        .floating-shapes::after {
            width: 150px;
            height: 150px;
            bottom: 30%;
            left: 15%;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body class="gradient-bg">
    <div class="floating-shapes"></div>
    
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="glass-effect rounded-2xl p-8 w-full max-w-md shadow-2xl relative z-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-pink-500 rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg">
                    <i class="fas fa-lock text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">Приватний файл</h1>
                <p class="text-white/70 text-sm mb-4">Цей файл захищено паролем</p>
                <div class="bg-white/10 rounded-lg p-3 inline-block">
                    <p class="text-white font-semibold flex items-center">
                        <i class="fas fa-file mr-2"></i>
                        <span class="max-w-xs truncate">{{ filename }}</span>
                    </p>
                </div>
            </div>

            <!-- Error message -->
            <div id="errorMessage" class="mb-6 p-3 rounded-lg text-sm font-medium bg-red-500/20 text-red-100 border border-red-400/30 hidden">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- Password Form -->
            <form id="passwordForm" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium text-white/90 mb-2">
                        <i class="fas fa-key mr-2"></i>Введіть пароль для доступу
                    </label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           required
                           placeholder="••••••••••••"
                           class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white text-center password-field placeholder-white/50 focus:outline-none input-glow focus:border-white/40 transition-all duration-300">
                </div>

                <button type="submit" 
                        id="submitBtn"
                        class="w-full py-3 px-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold rounded-lg shadow-lg hover:from-purple-600 hover:to-pink-600 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transform hover:scale-105 transition-all duration-300">
                    <i class="fas fa-unlock mr-2"></i>Відкрити файл
                </button>
            </form>

            <!-- Back to Main -->
            <div class="mt-6 text-center">
                <a href="/" 
                   class="inline-flex items-center text-white/70 hover:text-white transition-colors duration-300">
                    <i class="fas fa-arrow-left mr-2"></i>Повернутися на головну
                </a>
            </div>

        </div>
    </div>

    <script>
        const form = document.getElementById('passwordForm');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const fileId = '{{ file_id }}';

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                showError('Будь ласка, введіть пароль');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Перевірка...';
            
            try {
                const response = await fetch(`/p/${fileId}/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Redirect to download
                    submitBtn.innerHTML = '<i class="fas fa-check mr-2"></i>Успішно! Завантаження...';
                    submitBtn.classList.remove('from-purple-500', 'to-pink-500');
                    submitBtn.classList.add('from-green-500', 'to-emerald-500');
                    
                    setTimeout(() => {
                        window.location.href = data.url;
                    }, 1000);
                } else {
                    showError(data.message || 'Невірний пароль');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-unlock mr-2"></i>Відкрити файл';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                showError('Помилка з\'єднання. Спробуйте ще раз.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-unlock mr-2"></i>Відкрити файл';
            }
        });

        // Додаткові плаваючі елементи
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.floating-shapes');
            for (let i = 0; i < 3; i++) {
                const circle = document.createElement('div');
                circle.className = 'absolute rounded-full bg-white/5';
                circle.style.width = Math.random() * 100 + 50 + 'px';
                circle.style.height = circle.style.width;
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDelay = Math.random() * 6 + 's';
                circle.style.animation = 'float 8s ease-in-out infinite';
                container.appendChild(circle);
            }
        });
    </script>
</body>
</html>
